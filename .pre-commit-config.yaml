repos:
  - repo: local
    hooks:
      - id: pathcrumb
        name: pathcrumb
        entry: pathcrumb fix
        language: system
        types: [python]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: pytest
        name: Run pytest
        entry: poetry run pytest
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: gitlater
        name: git later
        entry: gitlater check
        language: system
        stages: [pre-commit]
        pass_filenames: false
